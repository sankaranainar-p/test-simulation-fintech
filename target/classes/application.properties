spring.application.name=test-simulation-fintech

# H2 In-Memory Database
spring.datasource.url=jdbc:h2:mem:tsf_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Server
server.port=8080

# -----------------------------------------------------------------------
# Ollama (primary LLM provider — local, no API costs)
# -----------------------------------------------------------------------
ollama.enabled=true
ollama.base-url=http://localhost:11434
ollama.model=llama3.2
ollama.temperature=0.1
ollama.num-predict=2048
ollama.timeout-seconds=120

# -----------------------------------------------------------------------
# Claude API (optional cloud fallback — used only when Ollama is unavailable)
# Set via environment variable: ANTHROPIC_API_KEY
# -----------------------------------------------------------------------
claude.api.url=https://api.anthropic.com/v1/messages
claude.api.model=claude-sonnet-4-20250514
claude.api.max-tokens=2048
claude.api.key=${ANTHROPIC_API_KEY:}

# CORS - Angular dev server
cors.allowed-origins=http://localhost:4200

server.error.include-message=always
server.error.include-binding-errors=always
